name: deepseek-r1-7b-ov-npu
alias: deepseek-r1-7b

description: DeepSeek R1 Distill Qwen 7B, a reasoning model distilled from DeepSeek R1, optimized for Intel NPU
model-card-url: https://huggingface.co/llmware/DeepSeek-R1-Distill-Qwen-7B-ov-int4-npu
quantization: distill-qwen-int4

disk-size: 4700M

capabilities:
  - text
  - thinking

components:
  - model-distill-qwen-7b-ov-int4-npu

environment:
  # For OVMS single-model mode, the model is referenced by name and the path to
  # the directory containing the OpenVINO IR files.
  - MODEL_NAME=DeepSeek-R1-Distill-Qwen-7B-ov-int4-npu
  - MODEL_PATH=$SNAP_COMPONENTS/model-distill-qwen-7b-ov-int4-npu/DeepSeek-R1-Distill-Qwen-7B-ov-int4-npu
