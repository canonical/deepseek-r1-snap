name: nvidia-gpu
summary: CUDA-optimized for NVIDIA GPUs
description: |
  This engine uses llama.cpp with the CUDA backend.
  
  It is optimized for NVIDIA GPUs.
vendor: Canonical Ltd

devices:
  allof:
    - type: cpu
      architecture: amd64
      flags: [sse4_2, f16c, fma, avx, avx2]
    - type: gpu
      vendor-id: 0x10de # Nvidia Corporation
      vram: 5G

runtime: llama-cpp-cuda

model:
  default: distill-qwen-7b-q4-k-m-gguf
  options:
    - distill-qwen-7b-q4-k-m-gguf
    - distill-qwen-1-5b-q8-0-gguf

configurations:
  sleep-idle-seconds: 600
