name: cpu-tiny
summary: CPU-optimized for workstations, offering lower accuracy at higher speed
description: |
  This engine uses llama.cpp with a smaller model.
  
  It is optimized for both amd64 and arm64 CPU architectures, for a wide range
  of architecture variants.
vendor: Canonical Ltd
experimental: true

devices:
  anyof:
    - type: cpu
      architecture: amd64
      flags: [sse4_2, f16c, fma, avx, avx2]
    - type: cpu
      architecture: arm64
      features: [asimd]  # for ARMv8 ASIMD includes NEON instruction set

runtime: llama-cpp-cpu

model:
  default: distill-qwen-1-5b-q8-0-gguf
  options:
    - distill-qwen-1-5b-q8-0-gguf

configurations:
  sleep-idle-seconds: 600
