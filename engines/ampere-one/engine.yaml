name: ampere-one
summary: Optimized for Ampere One CPUs
description: |
  This engine uses llama-aio (Ampere® optimized llama.cpp).
  
  It is optimized for Ampere One CPUs.
vendor: Ampere Computing

devices:
  anyof:
    - type: cpu
      architecture: arm64
      implementer-id: 0xc0 # Ampere Computing
      part-number: 0xac3   # One/Siryn
    - type: cpu
      architecture: arm64
      implementer-id: 0xc0 # Ampere Computing
      part-number: 0xac4   # 1A/OneX/OneM/Banshee

runtime: llama-aio-ampereone

model:
  default: deepseek-r1-7b
  options:
    - deepseek-r1-7b
    - deepseek-r1-1.5b

configurations:
  sleep-idle-seconds: 600
