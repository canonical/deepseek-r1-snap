name: ampere-one
summary: Optimized for Ampere One CPUs
description: |
  This engine uses llama.cpp built by Ampere (llama-aio).
  
  It is optimized for Ampere One CPUs.
vendor: Ampere Computing

devices:
  anyof:
    - type: cpu
      architecture: arm64
      implementer-id: 0xc0 # Ampere Computing
      part-number: 0xac3   # One/Siryn
    - type: cpu
      architecture: arm64
      implementer-id: 0xc0 # Ampere Computing
      part-number: 0xac4   # 1A/OneX/OneM/Banshee

runtime: llama-aio-ampereone

model:
  default: distill-qwen-7b-q4-k-m-gguf
  options:
    - distill-qwen-7b-q4-k-m-gguf
    - distill-qwen-1-5b-q8-0-gguf

configurations:
  sleep-idle-seconds: 600
