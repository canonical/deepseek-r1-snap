name: intel-npu
summary: Optimized for Intel NPUs
description: |
  This engine uses OpenVINO Model Server.
  
  It is optimized for Intel NPUs (Core Ultra series).
vendor: Intel Corporation

devices:
  allof:
    - type: cpu
      architecture: amd64
  anyof:
    # Panther Lake NPU
    - type: npu
      vendor-id: 0x8086 # Intel Corporation
      device-id: 0xb03e
      snap-connections: [ intel-npu, npu-libs ]
    # Lunar Lake NPU
    - type: npu
      vendor-id: 0x8086 # Intel Corporation
      device-id: 0x643e
      snap-connections: [ intel-npu, npu-libs ]
    # Meteor / Arrow Lake NPUs
    - type: npu
      vendor-id: 0x8086 # Intel Corporation
      device-id: 0x7d1d
      snap-connections: [ intel-npu, npu-libs ]

runtime: openvino-model-server

model:
  default: distill-qwen-7b-ov-int4-npu
  options:
    - distill-qwen-7b-ov-int4-npu
