name: llama-aio-ampereone

servers:
  openai:
    protocol: http
    base-path: /v1

environment:
  # Add llama-aio binaries
  - PATH=$PATH:$SNAP_COMPONENTS/llama-aio-ampereone/bin
  # Add llama-aio-built shared libraries
  - LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$SNAP_COMPONENTS/llama-aio-ampereone/lib

components:
  - llama-aio-ampereone
